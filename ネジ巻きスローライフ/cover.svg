<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" font-family="'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif">
  <!-- 背景(クラフト紙) -->
  <rect width="600" height="900" fill="#f4ead8"/>
  <rect x="18" y="18" width="564" height="864" fill="none" stroke="#a0632e" stroke-width="3"/>
  <rect x="28" y="28" width="544" height="844" fill="none" stroke="#a0632e" stroke-width="1" opacity=".6"/>

  <!-- 飾り歯車(隅) -->
  <circle cx="80" cy="120" r="26" fill="none" stroke="#a0632e" stroke-width="10" stroke-dasharray="8 6" opacity=".28"/>
  <circle cx="520" cy="110" r="18" fill="none" stroke="#a0632e" stroke-width="8" stroke-dasharray="6 5" opacity=".28"/>

  <!-- サブタイトル -->
  <text x="300" y="72" text-anchor="middle" font-size="19" fill="#7a6a50" letter-spacing="1">〜「時代遅れ」と言われた俺の手仕事、</text>
  <text x="300" y="100" text-anchor="middle" font-size="19" fill="#7a6a50" letter-spacing="1">実は王都の生命線でした〜</text>

  <!-- タイトル -->
  <text x="300" y="172" text-anchor="middle" font-size="31" fill="#3a342b" font-weight="700" letter-spacing="1">追放された定年魔道具師の</text>
  <text x="300" y="252" text-anchor="middle" font-size="70" fill="#a0632e" font-weight="700" letter-spacing="6">ネジ巻き</text>
  <text x="300" y="336" text-anchor="middle" font-size="62" fill="#a0632e" font-weight="700" letter-spacing="2">スローライフ</text>

  <!-- 夜の辺境と王都(下帯) -->
  <g>
    <rect x="28" y="640" width="544" height="232" fill="#2b3a55"/>
    <!-- 星 -->
    <g fill="#ffffff" opacity=".85">
      <circle cx="70" cy="662" r="1.8"/><circle cx="130" cy="680" r="1.4"/><circle cx="205" cy="658" r="1.8"/>
      <circle cx="268" cy="676" r="1.3"/><circle cx="335" cy="655" r="1.7"/><circle cx="395" cy="672" r="1.3"/>
      <circle cx="452" cy="656" r="1.6"/><circle cx="540" cy="668" r="1.8"/><circle cx="500" cy="700" r="1.2"/>
    </g>
    <!-- 大結界炉の塔と結界ドーム -->
    <path d="M 402 786 A 68 68 0 0 1 538 786" fill="none" stroke="#7fc8ff" stroke-width="2.5" opacity=".65"/>
    <rect x="462" y="700" width="16" height="86" fill="#182238"/>
    <rect x="456" y="694" width="28" height="10" rx="3" fill="#182238"/>
    <circle cx="470" cy="688" r="6" fill="#8fd8ff"/>
    <!-- 村のシルエット -->
    <g fill="#182238">
      <rect x="150" y="746" width="52" height="40"/><path d="M 144 748 L 176 722 L 208 748 Z"/>
      <rect x="240" y="756" width="44" height="30"/><path d="M 234 758 L 262 736 L 290 758 Z"/>
      <rect x="320" y="752" width="40" height="34"/><path d="M 314 754 L 340 732 L 366 754 Z"/>
    </g>
    <!-- 水車小屋 -->
    <g stroke="#182238" fill="none">
      <circle cx="92" cy="756" r="32" stroke-width="7"/>
      <line x1="92" y1="726" x2="92" y2="786" stroke-width="5"/>
      <line x1="62" y1="756" x2="122" y2="756" stroke-width="5"/>
      <line x1="71" y1="735" x2="113" y2="777" stroke-width="5"/>
      <line x1="113" y1="735" x2="71" y2="777" stroke-width="5"/>
    </g>
    <!-- 地面 -->
    <rect x="28" y="786" width="544" height="86" fill="#182238"/>
    <text x="300" y="838" text-anchor="middle" font-size="21" fill="#e9ddc2" letter-spacing="6">全10話・完結</text>
    <text x="300" y="862" text-anchor="middle" font-size="12" fill="#e9ddc2" letter-spacing="2" opacity=".55">創作小説プロジェクト</text>
  </g>

  <!-- 大歯車 -->
  <g>
    <g fill="#b3773f" stroke="#4a4238" stroke-width="2">
      <rect x="287" y="392" width="26" height="36" rx="6"/>
      <rect x="287" y="392" width="26" height="36" rx="6" transform="rotate(30 300 530)"/>
      <rect x="287" y="392" width="26" height="36" rx="6" transform="rotate(60 300 530)"/>
      <rect x="287" y="392" width="26" height="36" rx="6" transform="rotate(90 300 530)"/>
      <rect x="287" y="392" width="26" height="36" rx="6" transform="rotate(120 300 530)"/>
      <rect x="287" y="392" width="26" height="36" rx="6" transform="rotate(150 300 530)"/>
      <rect x="287" y="392" width="26" height="36" rx="6" transform="rotate(180 300 530)"/>
      <rect x="287" y="392" width="26" height="36" rx="6" transform="rotate(210 300 530)"/>
      <rect x="287" y="392" width="26" height="36" rx="6" transform="rotate(240 300 530)"/>
      <rect x="287" y="392" width="26" height="36" rx="6" transform="rotate(270 300 530)"/>
      <rect x="287" y="392" width="26" height="36" rx="6" transform="rotate(300 300 530)"/>
      <rect x="287" y="392" width="26" height="36" rx="6" transform="rotate(330 300 530)"/>
    </g>
    <circle cx="300" cy="530" r="118" fill="#f7efe0" stroke="#b3773f" stroke-width="13"/>
    <circle cx="300" cy="530" r="42" fill="#b3773f" stroke="#4a4238" stroke-width="2"/>
    <g fill="#f7efe0" stroke="#4a4238" stroke-width="2">
      <circle cx="300" cy="454" r="11"/><circle cx="366" cy="492" r="11"/><circle cx="366" cy="568" r="11"/>
      <circle cx="300" cy="606" r="11"/><circle cx="234" cy="568" r="11"/><circle cx="234" cy="492" r="11"/>
    </g>
  </g>

  <!-- 小歯車(左下・夜帯に噛む) -->
  <g>
    <g fill="#b3773f" stroke="#4a4238" stroke-width="2">
      <rect x="160" y="562" width="20" height="26" rx="5"/>
      <rect x="160" y="562" width="20" height="26" rx="5" transform="rotate(36 170 640)"/>
      <rect x="160" y="562" width="20" height="26" rx="5" transform="rotate(72 170 640)"/>
      <rect x="160" y="562" width="20" height="26" rx="5" transform="rotate(108 170 640)"/>
      <rect x="160" y="562" width="20" height="26" rx="5" transform="rotate(144 170 640)"/>
      <rect x="160" y="562" width="20" height="26" rx="5" transform="rotate(180 170 640)"/>
      <rect x="160" y="562" width="20" height="26" rx="5" transform="rotate(216 170 640)"/>
      <rect x="160" y="562" width="20" height="26" rx="5" transform="rotate(252 170 640)"/>
      <rect x="160" y="562" width="20" height="26" rx="5" transform="rotate(288 170 640)"/>
      <rect x="160" y="562" width="20" height="26" rx="5" transform="rotate(324 170 640)"/>
    </g>
    <circle cx="170" cy="640" r="60" fill="#f7efe0" stroke="#b3773f" stroke-width="9"/>
    <circle cx="170" cy="640" r="20" fill="#b3773f" stroke="#4a4238" stroke-width="2"/>
  </g>

  <!-- テツ(鉄くず食いの魔獣・大歯車の上) -->
  <g stroke="#3a342b" stroke-width="2.5">
    <!-- 尻尾3本 -->
    <g fill="#9a938a">
      <ellipse cx="352" cy="392" rx="24" ry="9" transform="rotate(-30 352 392)"/>
      <ellipse cx="358" cy="378" rx="24" ry="9" transform="rotate(-10 358 378)"/>
      <ellipse cx="356" cy="364" rx="24" ry="9" transform="rotate(12 356 364)"/>
    </g>
    <g fill="#5b554c" stroke="none">
      <circle cx="371" cy="381" r="5"/><circle cx="379" cy="376" r="5"/><circle cx="375" cy="368" r="5"/>
    </g>
    <!-- 体・頭 -->
    <ellipse cx="300" cy="392" rx="33" ry="26" fill="#9a938a"/>
    <circle cx="300" cy="356" r="21" fill="#9a938a"/>
    <path d="M 285 342 L 280 328 L 294 335 Z" fill="#9a938a"/>
    <path d="M 315 342 L 320 328 L 306 335 Z" fill="#9a938a"/>
    <!-- 顔(たぬき隈取り) -->
    <g stroke="none">
      <ellipse cx="291" cy="356" rx="8" ry="6" fill="#5b554c"/>
      <ellipse cx="309" cy="356" rx="8" ry="6" fill="#5b554c"/>
      <circle cx="291" cy="356" r="2.4" fill="#fff"/>
      <circle cx="309" cy="356" r="2.4" fill="#fff"/>
      <ellipse cx="300" cy="366" rx="7" ry="5" fill="#e9ddc2"/>
      <circle cx="300" cy="364" r="2.2" fill="#3a342b"/>
    </g>
    <!-- 前脚と、かじる鉄くず -->
    <ellipse cx="286" cy="404" rx="8" ry="11" fill="#9a938a"/>
    <ellipse cx="314" cy="404" rx="8" ry="11" fill="#9a938a"/>
    <rect x="290" y="396" width="20" height="9" rx="2" fill="#7d90a8"/>
  </g>

  <!-- げんこつ印(朱印) -->
  <g>
    <rect x="496" y="548" width="50" height="50" rx="7" fill="#b3402e" opacity=".92"/>
    <text x="521" y="586" text-anchor="middle" font-size="34" fill="#f7efe0" font-weight="700">拳</text>
  </g>
</svg>
