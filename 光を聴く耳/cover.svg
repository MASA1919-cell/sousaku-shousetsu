<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900">
  <defs>
    <linearGradient id="nightsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0c1c"/>
      <stop offset="0.55" stop-color="#151833"/>
      <stop offset="1" stop-color="#241a2e"/>
    </linearGradient>
    <radialGradient id="earglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe9b8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffe9b8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="teallight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7ef0d8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#7ef0d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmlight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd08a" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffd08a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1730"/>
      <stop offset="1" stop-color="#0c0a18"/>
    </linearGradient>
  </defs>

  <!-- 夜空 -->
  <rect width="600" height="900" fill="url(#nightsky)"/>

  <!-- 星 -->
  <g fill="#f5f0ff">
    <circle cx="60" cy="70" r="1.4" opacity="0.8"/><circle cx="140" cy="130" r="1.1" opacity="0.6"/>
    <circle cx="230" cy="60" r="1.3" opacity="0.7"/><circle cx="330" cy="100" r="1.2" opacity="0.6"/>
    <circle cx="420" cy="60" r="1.4" opacity="0.8"/><circle cx="520" cy="120" r="1.2" opacity="0.6"/>
    <circle cx="70" cy="180" r="1.1" opacity="0.5"/><circle cx="480" cy="180" r="1.1" opacity="0.5"/>
    <circle cx="300" cy="150" r="1.0" opacity="0.5"/><circle cx="550" cy="70" r="1.2" opacity="0.6"/>
  </g>

  <!-- 遠景の森(奥) -->
  <path d="M0 330 Q60 300 120 320 Q180 295 240 325 Q300 300 360 322 Q420 298 480 324 Q540 302 600 320 L600 470 L0 470 Z" fill="#1a1730" opacity="0.85"/>
  <!-- 遠景の谺人の光 -->
  <g>
    <circle cx="90" cy="350" r="10" fill="url(#teallight)"/>
    <circle cx="150" cy="380" r="7" fill="url(#teallight)"/>
    <circle cx="470" cy="360" r="9" fill="url(#teallight)"/>
    <circle cx="520" cy="390" r="6" fill="url(#teallight)"/>
    <circle cx="40" cy="400" r="6" fill="url(#teallight)"/>
    <circle cx="560" cy="340" r="7" fill="url(#teallight)"/>
  </g>

  <!-- 手前の森(左右の木立) -->
  <g fill="#100d1e">
    <path d="M-20 900 L-20 380 Q10 330 40 380 Q55 340 80 390 L100 900 Z"/>
    <path d="M620 900 L620 370 Q590 320 560 370 Q545 330 520 385 L500 900 Z"/>
  </g>

  <!-- 光を聴く耳(タイトルモチーフ) -->
  <g transform="translate(300 250)">
    <path d="M-46 -6 C-52 -60 -6 -96 34 -84 C74 -72 84 -28 62 8 C48 30 50 58 30 74 C10 90 -20 82 -22 58 C-24 40 -8 34 -10 16 C-12 -2 -30 2 -38 -14 C-44 -26 -40 -18 -46 -6 Z"
      fill="none" stroke="#f2ead6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <path d="M6 -6 C22 -6 26 14 12 22" fill="none" stroke="#f2ead6" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <!-- 耳へ流れ込む光の粒 -->
    <g fill="#ffe9b8">
      <circle cx="-150" cy="-40" r="4" opacity="0.9"/>
      <circle cx="-120" cy="-20" r="3.4" opacity="0.85"/>
      <circle cx="-92" cy="-6" r="3.8" opacity="0.9"/>
      <circle cx="-64" cy="2" r="3.2" opacity="0.8"/>
      <circle cx="-36" cy="6" r="3" opacity="0.85"/>
    </g>
    <g fill="#7ef0d8">
      <circle cx="150" cy="-30" r="4" opacity="0.9"/>
      <circle cx="120" cy="-12" r="3.4" opacity="0.85"/>
      <circle cx="94" cy="0" r="3.8" opacity="0.9"/>
      <circle cx="66" cy="8" r="3.2" opacity="0.8"/>
      <circle cx="40" cy="10" r="3" opacity="0.85"/>
    </g>
  </g>

  <!-- 手前の地面 -->
  <path d="M0 620 Q150 600 300 612 Q460 622 600 604 L600 900 L0 900 Z" fill="url(#ground)"/>
  <ellipse cx="150" cy="700" rx="220" ry="60" fill="url(#warmlight)" opacity="0.35"/>

  <!-- 二人のシルエット -->
  <g>
    <!-- 芽衣(人間・左) -->
    <g fill="#171325">
      <circle cx="228" cy="660" r="15"/>
      <path d="M215 654 q13 -18 26 0 l3 10 q-16 -8 -32 0 z" fill="#171325"/>
      <path d="M212 674 q16 -12 32 0 l6 60 h-44 z"/>
      <path d="M212 686 q-24 6 -30 22" stroke="#171325" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M222 680 Q252 648 224 614" stroke="#171325" stroke-width="8" fill="none" stroke-linecap="round"/>
      <rect x="214" y="732" width="9" height="26" rx="4"/>
      <rect x="231" y="732" width="9" height="26" rx="4"/>
    </g>
    <!-- 開いた掌(手話の所作) -->
    <path d="M212 596 q0 -15 9 -15 q9 0 9 15 l0 19 q0 9 -9 9 q-9 0 -9 -9 z" fill="#171325"/>

    <!-- スイ(谺人・右) -->
    <g fill="#171325">
      <circle cx="372" cy="660" r="14"/>
      <path d="M362 650 q-4 -16 6 -20" stroke="#171325" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M382 650 q4 -16 -6 -20" stroke="#171325" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="368" cy="628" r="3.2" fill="url(#teallight)"/>
      <circle cx="376" cy="628" r="3.2" fill="url(#teallight)"/>
      <path d="M358 672 q14 -10 28 0 l-4 58 h-38 z"/>
      <path d="M386 682 q22 4 28 20" stroke="#171325" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M378 680 Q348 648 376 612" stroke="#171325" stroke-width="8" fill="none" stroke-linecap="round"/>
      <rect x="360" y="728" width="9" height="26" rx="4"/>
      <rect x="376" y="728" width="9" height="26" rx="4"/>
    </g>
    <!-- スイの光る手 -->
    <path d="M367 594 q0 -15 9 -15 q9 0 9 15 l0 19 q0 9 -9 9 q-9 0 -9 -9 z" fill="url(#teallight)"/>

    <!-- 二人をつなぐ光の粒(架け橋) -->
    <g fill="#ffe9b8">
      <circle cx="234" cy="590" r="3" opacity="0.9"/>
      <circle cx="265" cy="574" r="3.4" opacity="0.9"/>
      <circle cx="300" cy="566" r="3.8" opacity="0.95"/>
      <circle cx="335" cy="574" r="3.4" opacity="0.9"/>
      <circle cx="364" cy="590" r="3" opacity="0.9"/>
    </g>
  </g>

  <!-- 足元の翠の花 -->
  <g>
    <circle cx="180" cy="792" r="5" fill="#7ef0d8" opacity="0.8"/>
    <circle cx="192" cy="798" r="3" fill="#a8f5e4" opacity="0.7"/>
    <circle cx="410" cy="796" r="4" fill="#7ef0d8" opacity="0.75"/>
  </g>

  <!-- タイトル -->
  <g font-family="'Yu Mincho','Hiragino Mincho ProN',serif">
    <text x="300" y="120" text-anchor="middle" font-size="58" font-weight="bold" fill="#f2ead6" stroke="#0a0c1c" stroke-width="8" paint-order="stroke" letter-spacing="4">光を聴く耳</text>
    <text x="300" y="480" text-anchor="middle" font-size="16" fill="#cfd6ea" stroke="#0a0c1c" stroke-width="5" paint-order="stroke" letter-spacing="1">声のない種族と手話通訳士が結んだ、</text>
    <text x="300" y="504" text-anchor="middle" font-size="16" fill="#cfd6ea" stroke="#0a0c1c" stroke-width="5" paint-order="stroke" letter-spacing="1">十年戦争の終わりのはじまり</text>
  </g>

  <!-- 帯 -->
  <rect x="0" y="812" width="600" height="88" fill="#0a0c1c" opacity="0.88"/>
  <text x="300" y="852" text-anchor="middle" font-family="'Yu Mincho','Hiragino Mincho ProN',serif" font-size="26" fill="#ffe9b8" letter-spacing="6">全10話・完結</text>
  <text x="300" y="882" text-anchor="middle" font-family="'Yu Mincho','Hiragino Mincho ProN',serif" font-size="15" fill="#9fd8c8" letter-spacing="2">光と声、二つの言葉をつなぐ異世界戦記</text>
</svg>
