<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900">
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05060f"/>
      <stop offset="0.7" stop-color="#0b1024"/>
      <stop offset="1" stop-color="#141b38"/>
    </linearGradient>
    <radialGradient id="earthglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7ec3ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7ec3ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="moonground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b9b4c4"/>
      <stop offset="1" stop-color="#8c8699"/>
    </linearGradient>
    <linearGradient id="postoffice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5efe0"/>
      <stop offset="1" stop-color="#e3d9c2"/>
    </linearGradient>
    <radialGradient id="windowlight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd98a"/>
      <stop offset="1" stop-color="#ffb84d"/>
    </radialGradient>
  </defs>

  <!-- 宇宙 -->
  <rect width="600" height="900" fill="url(#space)"/>

  <!-- 星 -->
  <g fill="#ffffff">
    <circle cx="50" cy="90" r="1.5" opacity="0.9"/><circle cx="130" cy="200" r="1.2" opacity="0.6"/>
    <circle cx="90" cy="330" r="1.3" opacity="0.7"/><circle cx="240" cy="120" r="1.1" opacity="0.5"/>
    <circle cx="330" cy="70" r="1.4" opacity="0.8"/><circle cx="540" cy="110" r="1.5" opacity="0.9"/>
    <circle cx="500" cy="330" r="1.2" opacity="0.6"/><circle cx="560" cy="250" r="1.3" opacity="0.7"/>
    <circle cx="40" cy="450" r="1.2" opacity="0.6"/><circle cx="200" cy="300" r="1.1" opacity="0.5"/>
    <circle cx="440" cy="180" r="1.2" opacity="0.6"/><circle cx="300" cy="230" r="1.0" opacity="0.5"/>
    <circle cx="160" cy="420" r="1.2" opacity="0.5"/><circle cx="480" cy="430" r="1.1" opacity="0.5"/>
  </g>

  <!-- 地球 -->
  <circle cx="450" cy="250" r="120" fill="url(#earthglow)"/>
  <g>
    <circle cx="450" cy="250" r="72" fill="#3f7fd9"/>
    <path d="M400 220 q20 -14 44 -8 q18 4 20 18 q-24 8 -44 2 q-16 -4 -20 -12 z" fill="#4fae6a"/>
    <path d="M462 288 q22 -10 34 2 q-6 16 -26 16 q-14 0 -8 -18 z" fill="#4fae6a"/>
    <path d="M412 268 q10 -4 16 4 q-4 10 -14 8 q-8 -2 -2 -12 z" fill="#4fae6a"/>
    <path d="M420 206 q30 -10 62 6" stroke="#ffffff" stroke-width="7" fill="none" opacity="0.55" stroke-linecap="round"/>
    <path d="M396 252 q26 12 58 6" stroke="#ffffff" stroke-width="6" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M428 300 q22 8 42 -2" stroke="#ffffff" stroke-width="5" fill="none" opacity="0.45" stroke-linecap="round"/>
    <path d="M450 178 a72 72 0 0 1 0 144 a58 72 0 0 0 0 -144 z" fill="#0b1024" opacity="0.28"/>
  </g>

  <!-- 月面 -->
  <path d="M0 640 Q150 610 300 622 Q460 634 600 612 L600 900 L0 900 z" fill="url(#moonground)"/>
  <ellipse cx="120" cy="700" rx="34" ry="10" fill="#7d7790"/>
  <ellipse cx="120" cy="697" rx="34" ry="10" fill="#a49eb2"/>
  <ellipse cx="500" cy="740" rx="26" ry="8" fill="#7d7790"/>
  <ellipse cx="500" cy="737" rx="26" ry="8" fill="#a49eb2"/>
  <ellipse cx="330" cy="860" rx="40" ry="12" fill="#7d7790"/>
  <ellipse cx="330" cy="856" rx="40" ry="12" fill="#a49eb2"/>

  <!-- 郵便局(小さなドームつき) -->
  <g>
    <path d="M175 560 a95 95 0 0 1 190 0 z" fill="#cfe4f2" opacity="0.35"/>
    <path d="M175 560 a95 95 0 0 1 190 0" stroke="#dceaf5" stroke-width="4" fill="none" opacity="0.7"/>
    <rect x="205" y="520" width="130" height="112" rx="8" fill="url(#postoffice)"/>
    <path d="M195 520 L270 478 L345 520 z" fill="#c8503e"/>
    <rect x="252" y="560" width="36" height="72" rx="4" fill="#7a5a3a"/>
    <circle cx="283" cy="598" r="3.5" fill="#e8c86a"/>
    <rect x="216" y="540" width="26" height="26" rx="4" fill="url(#windowlight)"/>
    <rect x="298" y="540" width="26" height="26" rx="4" fill="url(#windowlight)"/>
    <rect x="214" y="490" width="112" height="22" rx="6" fill="#f5efe0"/>
    <text x="270" y="506" text-anchor="middle" font-family="'Yu Mincho',serif" font-size="13" fill="#3a3244">静かの海郵便局</text>
    <!-- 赤いポスト -->
    <rect x="358" y="574" width="26" height="58" rx="8" fill="#c8503e"/>
    <rect x="360" y="588" width="22" height="5" rx="2" fill="#3a3244"/>
    <ellipse cx="371" cy="574" rx="13" ry="7" fill="#a63f30"/>
  </g>

  <!-- 二人のシルエット(丘の上) -->
  <g>
    <!-- 少年 -->
    <g fill="#2c2740">
      <circle cx="118" cy="640" r="10"/>
      <path d="M108 650 q10 -6 20 0 l4 34 h-28 z"/>
      <rect x="110" y="682" width="6" height="16" rx="3"/>
      <rect x="122" y="682" width="6" height="16" rx="3"/>
    </g>
    <!-- 少女(手紙を掲げる) -->
    <g fill="#2c2740">
      <circle cx="152" cy="644" r="9"/>
      <path d="M143 653 q9 -5 18 0 l3 30 h-24 z"/>
      <rect x="144" y="682" width="5" height="14" rx="2"/>
      <rect x="155" y="682" width="5" height="14" rx="2"/>
      <path d="M158 650 l14 -12" stroke="#2c2740" stroke-width="5" stroke-linecap="round" fill="none"/>
    </g>
    <!-- 手紙 -->
    <g transform="rotate(-12 178 632)">
      <rect x="168" y="626" width="22" height="15" fill="#fff8e8"/>
      <path d="M168 626 l11 8 l11 -8" stroke="#c8503e" stroke-width="2" fill="none"/>
    </g>
    <!-- ポン太 -->
    <g>
      <rect x="76" y="676" width="26" height="16" rx="5" fill="#4a4460"/>
      <circle cx="82" cy="694" r="4" fill="#2c2740"/>
      <circle cx="96" cy="694" r="4" fill="#2c2740"/>
      <circle cx="98" cy="680" r="2.5" fill="#ffd98a"/>
    </g>
  </g>

  <!-- タイトル -->
  <g font-family="'Yu Mincho','Hiragino Mincho ProN',serif">
    <text x="300" y="106" text-anchor="middle" font-size="62" font-weight="bold" fill="#fff8e8" stroke="#05060f" stroke-width="8" paint-order="stroke" letter-spacing="2">静かの海郵便局</text>
    <text x="300" y="152" text-anchor="middle" font-size="18" fill="#cfe0f0" stroke="#05060f" stroke-width="5" paint-order="stroke" letter-spacing="1">月面生まれの少年と地球の少女が届ける、</text>
    <text x="300" y="180" text-anchor="middle" font-size="18" fill="#cfe0f0" stroke="#05060f" stroke-width="5" paint-order="stroke" letter-spacing="1">一.三秒より遅い言葉たち</text>
  </g>

  <!-- 帯 -->
  <rect x="0" y="812" width="600" height="88" fill="#05060f" opacity="0.85"/>
  <text x="300" y="852" text-anchor="middle" font-family="'Yu Mincho','Hiragino Mincho ProN',serif" font-size="26" fill="#ffd98a" letter-spacing="6">全10話・完結</text>
  <text x="300" y="882" text-anchor="middle" font-family="'Yu Mincho','Hiragino Mincho ProN',serif" font-size="15" fill="#b9c6dd" letter-spacing="2">遅いは、強い。ほのぼの月面ロマンス</text>
</svg>
