<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fd0ec"/>
      <stop offset="0.55" stop-color="#bfe4e8"/>
      <stop offset="0.85" stop-color="#ffe2b0"/>
      <stop offset="1" stop-color="#ffcf94"/>
    </linearGradient>
    <radialGradient id="sunglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff3c8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fff3c8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="building" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a5c78"/>
      <stop offset="1" stop-color="#33415a"/>
    </linearGradient>
    <radialGradient id="windowglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff0cf" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffcf94" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4dfae"/>
      <stop offset="1" stop-color="#e8c98a"/>
    </linearGradient>
  </defs>

  <!-- 夕方前の空 -->
  <rect width="600" height="900" fill="url(#sky)"/>
  <circle cx="470" cy="330" r="150" fill="url(#sunglow)"/>
  <circle cx="470" cy="330" r="46" fill="#fff6da"/>

  <!-- 雲 -->
  <g fill="#ffffff" opacity="0.7">
    <ellipse cx="110" cy="150" rx="46" ry="14"/>
    <ellipse cx="145" cy="142" rx="34" ry="12"/>
    <ellipse cx="500" cy="120" rx="40" ry="12"/>
    <ellipse cx="80" cy="220" rx="28" ry="9"/>
  </g>

  <!-- 校舎(遠景) -->
  <path d="M0 430 L0 620 L600 620 L600 430 L560 430 L560 400 L520 400 L520 430 L440 430 L440 380 L400 380 L400 430 L200 430 L200 380 L160 380 L160 430 L80 430 L80 400 L40 400 L40 430 Z" fill="url(#building)"/>
  <!-- 校舎の窓(灯り) -->
  <g fill="#ffe9a8" opacity="0.85">
    <rect x="20" y="450" width="20" height="24" rx="2"/>
    <rect x="60" y="450" width="20" height="24" rx="2"/>
    <rect x="100" y="450" width="20" height="24" rx="2"/>
    <rect x="220" y="450" width="20" height="24" rx="2"/>
    <rect x="260" y="450" width="20" height="24" rx="2"/>
    <rect x="460" y="450" width="20" height="24" rx="2"/>
    <rect x="540" y="450" width="20" height="24" rx="2"/>
    <rect x="20" y="500" width="20" height="24" rx="2" opacity="0.5"/>
    <rect x="100" y="500" width="20" height="24" rx="2" opacity="0.5"/>
    <rect x="300" y="500" width="20" height="24" rx="2" opacity="0.5"/>
    <rect x="500" y="500" width="20" height="24" rx="2" opacity="0.5"/>
  </g>

  <!-- 台本(風にめくれるモチーフ) -->
  <g transform="translate(300 235) rotate(-6)">
    <rect x="-58" y="-78" width="116" height="150" rx="4" fill="#fffaf0" stroke="#33415a" stroke-width="3" opacity="0.96"/>
    <line x1="-38" y1="-48" x2="30" y2="-48" stroke="#cfd6e2" stroke-width="4"/>
    <line x1="-38" y1="-24" x2="34" y2="-24" stroke="#cfd6e2" stroke-width="4"/>
    <line x1="-38" y1="0" x2="20" y2="0" stroke="#cfd6e2" stroke-width="4"/>
    <line x1="-38" y1="24" x2="30" y2="24" stroke="#cfd6e2" stroke-width="4"/>
    <line x1="-38" y1="48" x2="10" y2="48" stroke="#cfd6e2" stroke-width="4"/>
  </g>
  <!-- ページの角が丸まって飛んでいく表現 -->
  <g fill="#fffaf0" stroke="#33415a" stroke-width="2.5" opacity="0.9">
    <path d="M120 210 q26 -10 40 8 q-18 10 -40 -8 z"/>
    <path d="M470 260 q-22 -14 -36 4 q16 12 36 -4 z"/>
  </g>
  <g fill="none" stroke="#5b6a86" stroke-width="2.5" opacity="0.6" stroke-linecap="round">
    <path d="M96 200 q16 -4 26 4"/>
    <path d="M84 216 q14 -2 22 6"/>
    <path d="M496 246 q-16 -6 -24 2"/>
    <path d="M506 264 q-14 -2 -20 8"/>
  </g>

  <!-- 手前の地面 -->
  <path d="M0 700 Q150 682 300 692 Q460 702 600 686 L600 900 L0 900 Z" fill="url(#ground)"/>

  <!-- 部室の窓枠 -->
  <g>
    <rect x="70" y="610" width="460" height="230" rx="10" fill="#fff8ea" opacity="0.16"/>
    <ellipse cx="300" cy="770" rx="230" ry="60" fill="url(#windowglow)" opacity="0.55"/>
  </g>

  <!-- 四人のシルエット -->
  <g fill="#2a2f45">
    <!-- すばる(中央左・片手を挙げて演じる) -->
    <circle cx="256" cy="700" r="15"/>
    <path d="M241 720 q15 -14 30 0 l4 68 h-38 z"/>
    <path d="M266 706 Q292 676 278 646" stroke="#2a2f45" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M246 726 q-18 6 -24 24" stroke="#2a2f45" stroke-width="7" fill="none" stroke-linecap="round"/>
    <rect x="244" y="784" width="9" height="26" rx="4"/>
    <rect x="260" y="784" width="9" height="26" rx="4"/>

    <!-- 陽向(両手を挙げて喜ぶ・右) -->
    <circle cx="360" cy="694" r="14"/>
    <path d="M346 712 q14 -12 28 0 l4 64 h-36 z"/>
    <path d="M352 716 Q328 690 336 660" stroke="#2a2f45" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M372 716 Q396 688 388 658" stroke="#2a2f45" stroke-width="7" fill="none" stroke-linecap="round"/>
    <rect x="348" y="776" width="8" height="24" rx="4"/>
    <rect x="363" y="776" width="8" height="24" rx="4"/>

    <!-- 因幡(工具を持つ・左) -->
    <circle cx="176" cy="712" r="13"/>
    <path d="M163 728 q13 -10 26 0 l3 58 h-32 z"/>
    <path d="M186 730 q16 4 20 20" stroke="#2a2f45" stroke-width="6" fill="none" stroke-linecap="round"/>
    <rect x="203" y="746" width="16" height="6" rx="2"/>
    <rect x="166" y="792" width="7" height="22" rx="3"/>
    <rect x="179" y="792" width="7" height="22" rx="3"/>

    <!-- ののか(ギターを抱える・右端) -->
    <circle cx="436" cy="714" r="13"/>
    <path d="M424 730 q12 -9 24 0 l3 56 h-30 z"/>
    <ellipse cx="440" cy="758" rx="15" ry="20" fill="#5b3a2a"/>
    <rect x="437" y="736" width="4" height="24" fill="#3a2417"/>
    <rect x="428" y="794" width="7" height="20" rx="3" fill="#2a2f45"/>
    <rect x="441" y="794" width="7" height="20" rx="3" fill="#2a2f45"/>
  </g>

  <!-- タイトル -->
  <g font-family="'Yu Mincho','Hiragino Mincho ProN',serif">
    <text x="300" y="108" text-anchor="middle" font-size="54" font-weight="bold" fill="#2a2f45" stroke="#fffaf0" stroke-width="9" paint-order="stroke" letter-spacing="3">台本のない教室</text>
    <text x="300" y="340" text-anchor="middle" font-size="16" fill="#33415a" stroke="#fffaf0" stroke-width="5" paint-order="stroke" letter-spacing="1">震えながらも、ちゃんと立てた日を</text>
    <text x="300" y="364" text-anchor="middle" font-size="16" fill="#33415a" stroke="#fffaf0" stroke-width="5" paint-order="stroke" letter-spacing="1">積み重ねる、部活と再生の物語</text>
  </g>

  <!-- 帯 -->
  <rect x="0" y="812" width="600" height="88" fill="#2a2f45" opacity="0.9"/>
  <text x="300" y="852" text-anchor="middle" font-family="'Yu Mincho','Hiragino Mincho ProN',serif" font-size="26" fill="#ffe2b0" letter-spacing="6">全10話・完結</text>
  <text x="300" y="882" text-anchor="middle" font-family="'Yu Mincho','Hiragino Mincho ProN',serif" font-size="15" fill="#bcd8dc" letter-spacing="2">なんでも部、はじめました。爽快青春群像劇</text>
</svg>
