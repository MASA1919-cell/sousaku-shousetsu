<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2233"/>
      <stop offset="1" stop-color="#2a3348"/>
    </linearGradient>
    <linearGradient id="doorlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5e9c8"/>
      <stop offset="1" stop-color="#e8cf9a"/>
    </linearGradient>
    <linearGradient id="floorlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8cf9a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#e8cf9a" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e2a33"/>
      <stop offset="1" stop-color="#1c1a22"/>
    </linearGradient>
    <linearGradient id="seasky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9866e"/>
      <stop offset="0.6" stop-color="#8d6a7e"/>
      <stop offset="1" stop-color="#5c5578"/>
    </linearGradient>
  </defs>

  <!-- 室内の壁 -->
  <rect width="600" height="900" fill="url(#wall)"/>

  <!-- 壁の写真フレーム: 夕暮れの防波堤 -->
  <g>
    <rect x="150" y="210" width="300" height="200" fill="#0e1420"/>
    <rect x="158" y="218" width="284" height="184" fill="url(#seasky)"/>
    <!-- 海 -->
    <rect x="158" y="330" width="284" height="72" fill="#4a4668"/>
    <rect x="158" y="330" width="284" height="3" fill="#d9a07e" opacity="0.7"/>
    <!-- 夕陽 -->
    <circle cx="380" cy="300" r="26" fill="#f0c27a" opacity="0.9"/>
    <!-- 防波堤 -->
    <path d="M158 372 L340 348 L442 344 L442 360 L350 362 L158 390 z" fill="#33304a"/>
    <!-- 灯台 -->
    <rect x="424" y="316" width="12" height="30" fill="#2b2840"/>
    <circle cx="430" cy="313" r="4" fill="#f0c27a"/>
    <!-- 女性の後ろ姿(小さなシルエット) -->
    <g fill="#211e33">
      <circle cx="352" cy="332" r="6"/>
      <path d="M346 338 q6 -4 12 0 l3 20 h-18 z"/>
    </g>
    <!-- フレームの光沢 -->
    <rect x="158" y="218" width="284" height="184" fill="#ffffff" opacity="0.04"/>
  </g>

  <!-- 床 -->
  <rect x="0" y="560" width="600" height="340" fill="url(#floor)"/>
  <line x1="0" y1="560" x2="600" y2="560" stroke="#151320" stroke-width="3"/>
  <!-- 床板の目地 -->
  <g stroke="#141220" stroke-width="2" opacity="0.6">
    <line x1="0" y1="640" x2="600" y2="632"/>
    <line x1="0" y1="730" x2="600" y2="718"/>
    <line x1="0" y1="820" x2="600" y2="806"/>
  </g>

  <!-- 開いたドアと漏れる光 -->
  <g>
    <!-- ドア枠 -->
    <rect x="52" y="330" width="160" height="234" fill="#141a28"/>
    <!-- 光の隙間 -->
    <polygon points="88,336 200,336 200,560 88,560" fill="url(#doorlight)"/>
    <!-- 開いたドア板 -->
    <polygon points="88,336 88,560 30,588 30,352" fill="#232c40"/>
    <circle cx="76" cy="462" r="5" fill="#8a7a4e"/>
    <!-- 床に伸びる光 -->
    <polygon points="88,560 200,560 320,760 40,760" fill="url(#floorlight)"/>
  </g>

  <!-- 光の中の遺品 -->
  <g>
    <!-- 段ボール箱 -->
    <g>
      <polygon points="150,610 250,602 262,652 160,662" fill="#8a6f4e"/>
      <polygon points="150,610 160,662 150,700 142,648" fill="#6e583d"/>
      <polygon points="250,602 262,652 254,690 150,700 160,662" fill="#7d6445"/>
      <line x1="200" y1="606" x2="208" y2="656" stroke="#5c4832" stroke-width="3"/>
    </g>
    <!-- 一枚の写真 -->
    <g transform="rotate(-8 320 690)">
      <rect x="292" y="668" width="76" height="56" fill="#f2ead6"/>
      <rect x="298" y="674" width="64" height="38" fill="#8d6a7e"/>
      <rect x="298" y="700" width="64" height="12" fill="#4a4668"/>
      <circle cx="344" cy="686" r="6" fill="#f0c27a"/>
      <path d="M322 704 q3 -8 8 0 z" fill="#211e33"/>
    </g>
    <!-- 飴色の髪留め -->
    <path d="M400 712 q14 -10 28 0" stroke="#c98d3f" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- タイトル -->
  <g font-family="'Yu Mincho','Hiragino Mincho ProN',serif">
    <text x="300" y="112" text-anchor="middle" font-size="72" font-weight="bold" fill="#f2ead6" stroke="#10141f" stroke-width="8" paint-order="stroke" letter-spacing="6">さよならの部屋</text>
    <text x="300" y="160" text-anchor="middle" font-size="19" fill="#d8cbb0" stroke="#10141f" stroke-width="5" paint-order="stroke" letter-spacing="1">遺品整理士・三雲汐里が読み解く、死者たちの最後の伝言</text>
  </g>

  <!-- 帯 -->
  <rect x="0" y="812" width="600" height="88" fill="#10141f" opacity="0.88"/>
  <text x="300" y="852" text-anchor="middle" font-family="'Yu Mincho','Hiragino Mincho ProN',serif" font-size="26" fill="#e8cf9a" letter-spacing="6">全10話・完結</text>
  <text x="300" y="882" text-anchor="middle" font-family="'Yu Mincho','Hiragino Mincho ProN',serif" font-size="15" fill="#b9b2c9" letter-spacing="2">四年前に止まった時間を、いま片付ける。静かな再生のミステリ</text>
</svg>
