<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>創作小説プロジェクト</title>
<style>
  :root {
    --bg: #f6f1e7; --card: #fffdf7; --ink: #33302a; --sub: #7a7263;
    --accent: #a0632e; --line: #e3dac8; --shadow: rgba(90, 70, 40, .08);
  }
  [data-theme="dark"] {
    --bg: #201e1b; --card: #2a2723; --ink: #e8e2d5; --sub: #9a9284;
    --accent: #d99a5b; --line: #3b372f; --shadow: rgba(0, 0, 0, .35);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Noto Serif JP", serif;
    line-height: 1.9; transition: background .25s, color .25s;
  }
  header {
    position: sticky; top: 0; z-index: 10; background: var(--card);
    border-bottom: 1px solid var(--line); box-shadow: 0 1px 6px var(--shadow);
    padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  header h1 { font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  header h1 span { color: var(--accent); }
  .spacer { flex: 1; }
  .btn {
    font: inherit; font-size: 13px; color: var(--ink); background: transparent;
    border: 1px solid var(--line); border-radius: 8px; padding: 4px 10px; cursor: pointer;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  main { max-width: 42em; margin: 0 auto; padding: 24px 20px 80px; }

  /* 作品一覧 */
  .novel-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 22px 24px; margin-bottom: 18px; cursor: pointer;
    box-shadow: 0 2px 10px var(--shadow); transition: transform .12s;
    display: flex; gap: 22px; align-items: flex-start;
  }
  .novel-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .cover {
    width: 132px; aspect-ratio: 2 / 3; object-fit: cover; flex-shrink: 0;
    border: 1px solid var(--line); border-radius: 6px;
    box-shadow: 3px 4px 12px var(--shadow); background: #f4ead8;
  }
  .card-info { flex: 1; min-width: 0; }
  @media (max-width: 480px) {
    .novel-card { gap: 14px; padding: 16px; }
    .cover { width: 96px; }
  }
  .novel-card h2 { font-size: 19px; margin-bottom: 2px; }
  .novel-card .subtitle { font-size: 13px; color: var(--accent); margin-bottom: 10px; }
  .novel-card .meta { font-size: 12px; color: var(--sub); margin-bottom: 10px; }
  .novel-card .synopsis { font-size: 14px; color: var(--sub); line-height: 1.8; }
  .resume { margin-top: 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .resume .btn { color: var(--accent); border-color: var(--accent); font-size: 13px; padding: 6px 14px; }
  .resume .btn:hover { background: var(--accent); color: var(--card); }
  .progress-note { font-size: 12px; color: var(--sub); }

  /* 目次 */
  .toc-head { margin-bottom: 20px; display: flex; gap: 24px; align-items: flex-start; }
  .toc-head .cover { width: 150px; cursor: zoom-in; }
  .toc-info { flex: 1; min-width: 0; }
  .toc-head h2 { font-size: 21px; }
  /* 表紙拡大 */
  .cover-overlay {
    position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center; cursor: zoom-out;
  }
  .cover-overlay img { height: min(92vh, 900px); max-width: 92vw; border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,.5); }
  .toc-head .subtitle { font-size: 13px; color: var(--accent); margin: 4px 0 10px; }
  .toc-head .synopsis { font-size: 14px; color: var(--sub); }
  .ep-item {
    display: flex; align-items: baseline; gap: 12px; background: var(--card);
    border: 1px solid var(--line); border-radius: 10px; padding: 12px 18px;
    margin-bottom: 8px; cursor: pointer;
  }
  .ep-item:hover { border-color: var(--accent); }
  .ep-item .no { font-size: 12px; color: var(--sub); white-space: nowrap; }
  .ep-item .t { font-size: 15px; }
  .ep-item .read { margin-left: auto; font-size: 11px; color: var(--accent); white-space: nowrap; }

  /* 本文 */
  article h2 { font-size: 20px; margin: 8px 0 4px; }
  article .ep-no { font-size: 12px; color: var(--sub); }
  article .novel-name { font-size: 12px; color: var(--accent); cursor: pointer; }
  article .body { margin-top: 28px; }
  article .body p { margin-bottom: 1em; font-size: var(--fs, 16px); }
  article .body p.sep { text-align: center; color: var(--sub); margin: 1.6em 0; }
  article .body p.note { color: var(--sub); font-size: 13px; text-align: right; margin-top: 2.5em; }
  nav.pager { display: flex; gap: 10px; margin-top: 48px; }
  nav.pager .btn { flex: 1; padding: 12px; text-align: center; font-size: 14px; }
  nav.pager .btn:disabled { opacity: .35; cursor: default; }
  .progress { font-size: 11px; color: var(--sub); text-align: center; margin-top: 14px; }
</style>
</head>
<body>
<header>
  <h1 onclick="location.hash=''"><span>◆</span> 創作小説プロジェクト</h1>
  <div class="spacer"></div>
  <button class="btn" onclick="cycleFont()" title="文字サイズ">文字 <span id="fsLabel">中</span></button>
  <button class="btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
</header>
<main id="app"></main>

<script src="data.js"></script>
<script>
  const $ = s => document.querySelector(s);
  const store = {
    get k() { return 'sousaku-novel'; },
    load() { try { return JSON.parse(localStorage.getItem(this.k)) || {}; } catch { return {}; } },
    save(patch) { localStorage.setItem(this.k, JSON.stringify({ ...this.load(), ...patch })); }
  };

  // テーマ
  function applyTheme(t) {
    document.documentElement.dataset.theme = t;
    $('#themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
  }
  function toggleTheme() {
    const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    store.save({ theme: t }); applyTheme(t);
  }

  // 文字サイズ
  const FS = [{ label: '小', px: 14 }, { label: '中', px: 16 }, { label: '大', px: 19 }];
  let fsIdx = 1;
  function applyFont() {
    document.documentElement.style.setProperty('--fs', FS[fsIdx].px + 'px');
    $('#fsLabel').textContent = FS[fsIdx].label;
  }
  function cycleFont() { fsIdx = (fsIdx + 1) % FS.length; store.save({ fs: fsIdx }); applyFont(); }

  function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  // しおり(作品ごと): ep=最後に開いた話, scroll=その話のスクロール位置, furthest=最遠読了話
  let current = null;        // 現在読んでいる { novelId, ep } (スクロール保存用)
  let pendingScroll = null;  // 「続きから読む」で復元するスクロール位置
  function getMark(id) {
    const m = (store.load().bookmarks || {})[id];
    if (m == null) return null;
    return typeof m === 'number' ? { ep: m, furthest: m, scroll: 0 } : m; // 旧形式(数値)からの移行
  }
  function setMark(id, patch) {
    const marks = store.load().bookmarks || {};
    marks[id] = { ...(getMark(id) || {}), ...patch };
    store.save({ bookmarks: marks });
  }
  // 表紙の拡大表示(クリックで閉じる)
  function zoomCover(src) {
    const ov = document.createElement('div');
    ov.className = 'cover-overlay';
    ov.innerHTML = `<img src="${esc(src)}" alt="表紙(拡大)">`;
    ov.onclick = () => ov.remove();
    document.body.appendChild(ov);
  }

  function resumeNovel(id) {
    const mark = getMark(id);
    if (!mark) { location.hash = id; return; }
    pendingScroll = mark.scroll || 0;
    const target = `${id}/${mark.ep}`;
    if (decodeURIComponent(location.hash.replace(/^#/, '')) === target) route();
    else location.hash = target;
  }
  // 読書中はスクロール位置をしおりに保存し続ける
  let scrollTimer = null;
  addEventListener('scroll', () => {
    if (!current) return;
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => { if (current) setMark(current.novelId, { scroll: Math.round(scrollY) }); }, 300);
  });
  addEventListener('beforeunload', () => { if (current) setMark(current.novelId, { scroll: Math.round(scrollY) }); });

  // ルーティング: #作品id  /  #作品id/話数
  function route() {
    const hash = decodeURIComponent(location.hash.replace(/^#/, ''));
    if (!hash) return renderHome();
    const [id, epStr] = hash.split('/');
    const novel = NOVELS.find(n => n.id === id);
    if (!novel) return renderHome();
    if (!epStr) return renderToc(novel);
    const ep = novel.episodes.find(e => e.no === Number(epStr));
    ep ? renderReader(novel, ep) : renderToc(novel);
  }

  function renderHome() {
    current = null;
    $('#app').innerHTML = NOVELS.map(n => {
      const chars = n.episodes.reduce((s, e) => s + e.body.replace(/\s/g, '').length, 0);
      const mark = getMark(n.id);
      return `<div class="novel-card" onclick="location.hash='${esc(n.id)}'">
        ${n.cover ? `<img class="cover" src="${esc(n.cover)}" alt="『${esc(n.title)}』表紙">` : ''}
        <div class="card-info">
          <h2>${esc(n.title)}</h2>
          <div class="subtitle">${esc(n.subtitle)}</div>
          <div class="meta">全${n.episodes.length}話 ・ 約${chars.toLocaleString()}字(1話 約10分)</div>
          <div class="synopsis">${esc(n.synopsis).replace(/\n/g, '<br>')}</div>
          ${mark ? `<div class="resume">
            <button class="btn" onclick="event.stopPropagation(); resumeNovel('${esc(n.id)}')">▶ 続きから読む — 第${mark.ep}話</button>
            <span class="progress-note">🔖 読了 ${mark.furthest} / ${n.episodes.length}話</span>
          </div>` : ''}
        </div>
      </div>`;
    }).join('');
    document.title = '創作小説プロジェクト';
    scrollTo(0, 0);
  }

  function renderToc(novel) {
    current = null;
    const mark = getMark(novel.id);
    $('#app').innerHTML = `
      <div class="toc-head">
        ${novel.cover ? `<img class="cover" src="${esc(novel.cover)}" alt="『${esc(novel.title)}』表紙" title="クリックで拡大" onclick="zoomCover('${esc(novel.cover)}')">` : ''}
        <div class="toc-info">
          <h2>${esc(novel.title)}</h2>
          <div class="subtitle">${esc(novel.subtitle)}</div>
          <div class="synopsis">${esc(novel.synopsis).replace(/\n/g, '<br>')}</div>
          ${mark ? `<div class="resume">
            <button class="btn" onclick="resumeNovel('${esc(novel.id)}')">▶ 続きから読む — 第${mark.ep}話</button>
          </div>` : ''}
        </div>
      </div>` +
      novel.episodes.map(e => `
        <div class="ep-item" onclick="location.hash='${esc(novel.id)}/${e.no}'">
          <span class="no">第${e.no}話</span><span class="t">${esc(e.title)}</span>
          ${mark && e.no <= mark.furthest ? '<span class="read">✓ 読了</span>' : ''}
        </div>`).join('');
    document.title = `${novel.title} — 目次`;
    scrollTo(0, 0);
  }

  function renderBody(body) {
    return body.split('\n').map(line => {
      const t = line.trim();
      if (!t) return '';
      if (t === '◇') return '<p class="sep">◇</p>';
      if (/^[((]第\d+話.*[))]$/.test(t) || t === '——おしまい。') return `<p class="note">${esc(t)}</p>`;
      return `<p>${esc(line)}</p>`;
    }).join('');
  }

  function renderReader(novel, ep) {
    const prev = novel.episodes.find(e => e.no === ep.no - 1);
    const next = novel.episodes.find(e => e.no === ep.no + 1);
    $('#app').innerHTML = `
      <article>
        <div class="novel-name" onclick="location.hash='${esc(novel.id)}'">${esc(novel.title)} ▾</div>
        <div class="ep-no">第${ep.no}話 / 全${novel.episodes.length}話</div>
        <h2>${esc(ep.title)}</h2>
        <div class="body">${renderBody(ep.body)}</div>
        <nav class="pager">
          <button class="btn" ${prev ? `onclick="location.hash='${esc(novel.id)}/${prev.no}'"` : 'disabled'}>← 前の話</button>
          <button class="btn" onclick="location.hash='${esc(novel.id)}'">目次</button>
          <button class="btn" ${next ? `onclick="location.hash='${esc(novel.id)}/${next.no}'"` : 'disabled'}>次の話 →</button>
        </nav>
        <div class="progress">${'●'.repeat(ep.no)}${'○'.repeat(novel.episodes.length - ep.no)}</div>
      </article>`;
    document.title = `第${ep.no}話 ${ep.title} — ${novel.title}`;
    // しおり: 最後に開いた話・スクロール位置・最遠読了話を作品ごとに記録
    const old = getMark(novel.id);
    const restore = pendingScroll != null ? pendingScroll : 0;
    pendingScroll = null;
    setMark(novel.id, { ep: ep.no, scroll: restore, furthest: Math.max(old ? old.furthest : 0, ep.no) });
    current = { novelId: novel.id, ep: ep.no };
    scrollTo(0, restore);
  }

  // キーボード: ←→で前後の話
  addEventListener('keydown', e => {
    const m = decodeURIComponent(location.hash.replace(/^#/, '')).split('/');
    if (m.length !== 2) return;
    const novel = NOVELS.find(n => n.id === m[0]);
    if (!novel) return;
    const no = Number(m[1]);
    if (e.key === 'ArrowLeft' && no > 1) location.hash = `${novel.id}/${no - 1}`;
    if (e.key === 'ArrowRight' && no < novel.episodes.length) location.hash = `${novel.id}/${no + 1}`;
  });

  // 初期化
  (function init() {
    const st = store.load();
    applyTheme(st.theme || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
    fsIdx = st.fs ?? 1; applyFont();
    addEventListener('hashchange', route);
    route();
  })();
</script>
</body>
</html>
